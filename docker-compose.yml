version: '3.8'

services:
  ariba-mcp:
    build:
      context: ./Ariba-MCP
      dockerfile: Dockerfile
    container_name: ariba-mcp
    ports:
      - "8000:8000"
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - ARIBA_USE_MOCK=true
    env_file:
      - ./Ariba-MCP/.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - ariba-network

  ariba-agent:
    build:
      context: ./Ariba-Agent
      dockerfile: Dockerfile
    container_name: ariba-agent
    ports:
      - "5000:5000"
    environment:
      - HOST=0.0.0.0
      - PORT=5000
      - ARIBA_MCP_URL=http://ariba-mcp:8000/mcp/
    env_file:
      - ./Ariba-Agent/.env
    depends_on:
      ariba-mcp:
        condition: service_healthy
    volumes:
      - ${HOME}/.azure:/root/.azure:ro  # Para DefaultAzureCredential
    networks:
      - ariba-network

networks:
  ariba-network:
    driver: bridge
