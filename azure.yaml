# azure.yaml
# Definicao do projeto para Azure Developer CLI (azd)

name: sap-ariba-mcp
metadata:
  template: custom
services:
  ariba-mcp:
    project: ./Ariba-MCP
    language: python
    host: containerapp
    docker:
      path: Dockerfile
      remoteBuild: true
  ariba-agent:
    project: ./Ariba-Agent
    language: python
    host: containerapp
    docker:
      path: Dockerfile
      remoteBuild: true

infra:
  provider: bicep
  path: ./infra